version: '3.8'

services:
  app:
    image: ${DOCKER_IMAGE}:${DOCKER_TAG}
    container_name: vertoz-uat
    ports:
      - "9092:8080"
    environment:
      - APP_VERSION=${DOCKER_TAG}
      - ENVIRONMENT=uat
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
