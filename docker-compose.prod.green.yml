# docker-compose.prod.green.yml
version: '3.8'
services:
  app:
    build: .
    container_name: vertoz-prod-green
    ports:
      - "9093:8080"
    environment:
      - APP_VERSION=1.0.0
      - ENVIRONMENT=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
