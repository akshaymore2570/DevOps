name: PR Checks

on:
  pull_request:
    branches: [ develop, main ]
  push:
    branches: [ develop ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black flake8 pytest pytest-cov bandit safety
      
      - name: Code Formatting (Black)
        run: black --check src/
      
      - name: Linting (Flake8)
        run: flake8 src/ --count --max-complexity=10
      
      - name: Security Scan (Bandit)
        run: bandit -r src/ -f json -o bandit-report.json || true
      
      - name: Unit Tests
        run: |
          pytest tests/unit/ \
            --cov=src/ \
            --cov-report=xml \
            --cov-report=html \
            --junitxml=test-reports/results.xml \
            -v
      
      - name: Upload Test Results
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: test-reports/
      
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report
          path: htmlcov/
      
      - name: Comment PR with Coverage
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const coverage = fs.readFileSync('coverage.xml', 'utf8');
            const coveragePercent = coverage.match(/line-rate="([0-9.]+)"/)[1];
            const comment = `## 📊 Test Coverage\n\n**Coverage: ${Math.round(coveragePercent * 100)}%**`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
